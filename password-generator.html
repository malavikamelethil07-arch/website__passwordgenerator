
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="password-style.css" />
</head>
<body>

  <div class="card">

    <h1 class="title">Password Generator <span class="lock-icon">🔐</span></h1>

    <!-- Generated password display -->
    <div class="output-box">
      <span id="password-display">Click Generate...</span>
      <button class="icon-btn" onclick="copyPassword()" title="Copy">
        <i class="fa-regular fa-copy"></i>
      </button>
    </div>
    <p class="error-msg" id="error-msg"></p>
    <!-- Strength bar -->
    <div class="strength-row">
      <span class="strength-label">Strength:</span>
      <div class="strength-bar-track">
        <div class="strength-bar-fill" id="strength-bar"></div>
      </div>
      <span class="strength-text" id="strength-text">—</span>
    </div>

    <!-- Length slider -->
    <div class="slider-section">
      <label>Password Length: <strong id="length-display">12</strong></label>
      <input type="range" id="length-slider" min="6" max="32" value="12"
             oninput="updateLength(this.value)" />
    </div>

    <!-- Checkboxes -->
    <div class="checkbox-group">
      <label class="check-label">
        <input type="checkbox" id="opt-upper" checked /> Uppercase
      </label>
      <label class="check-label">
        <input type="checkbox" id="opt-lower" checked /> Lowercase
      </label>
      <label class="check-label">
        <input type="checkbox" id="opt-numbers" checked /> Numbers
      </label>
      <label class="check-label">
        <input type="checkbox" id="opt-symbols" /> Symbols
      </label>
    </div>

    <!-- Optional keyword -->
    <div class="keyword-section">
      <input type="text" id="keyword-input"
             placeholder="Optional keyword (securely mixed in)" />
      <p class="keyword-hint">
        <i class="fa-solid fa-shield-halved"></i>
        Your keyword is shuffled with random data — it won't appear as-is in the password.
      </p>
    </div>

    <!-- Buttons -->
    <div class="btn-group">
      <button class="btn btn-generate" onclick="generatePassword()">
        <i class="fa-solid fa-bolt"></i> Generate
      </button>
      <button class="btn btn-copy" onclick="copyPassword()">
        <i class="fa-regular fa-copy"></i> Copy
      </button>
      <button class="btn btn-reset" onclick="resetAll()">
        <i class="fa-solid fa-rotate-left"></i> Reset
      </button>
    </div>

    <!-- Copy toast notification -->
    <div class="toast" id="toast">
      <i class="fa-solid fa-check"></i> Copied to clipboard!
    </div>

  </div>

  <script src="password-script.js"></script>
</body>
</html>
